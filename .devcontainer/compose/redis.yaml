# Redis — in-memory data store.

services:
  redis:
    profiles: [redis]
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:15433:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - musher-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  musher-redis-data:
