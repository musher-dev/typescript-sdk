pre-commit:
  parallel: true
  jobs:
    - name: format
      glob: "*.{ts,tsx,js,json}"
      run: pnpm biome format --write {staged_files} && git add {staged_files}

    - name: lint
      glob: "*.{ts,tsx,js}"
      run: pnpm biome lint {staged_files}

    - name: types
      run: pnpm -r check:types
