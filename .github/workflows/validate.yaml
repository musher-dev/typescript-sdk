name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      devcontainer: ${{ steps.filter.outputs.devcontainer }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            devcontainer:
              - '.devcontainer/**'
              - '.github/workflows/validate.yaml'

  shellcheck:
    name: ShellCheck
    needs: detect-changes
    if: needs.detect-changes.outputs.devcontainer == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .devcontainer/scripts
          severity: warning

  compose:
    name: Compose Config
    needs: detect-changes
    if: needs.detect-changes.outputs.devcontainer == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        run: |
          cp .devcontainer/.env.example .devcontainer/.env
          docker compose -f .devcontainer/compose.yaml config --quiet

  build:
    name: Devcontainer Build
    needs: detect-changes
    if: needs.detect-changes.outputs.devcontainer == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build devcontainer
        uses: devcontainers/ci@v0.3
        with:
          runCmd: echo "devcontainer smoke test passed"
